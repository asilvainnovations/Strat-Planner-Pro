name: Auto-Maintenance Tasks

on:
  schedule:
    - cron: '0 2 * * MON'  # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

jobs:
  auto-label-issues:
    name: Auto-Label Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-label issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues.data) {
              const labels = [];
              const title = issue.title.toLowerCase();
              const body = (issue.body || '').toLowerCase();

              // Auto-label based on keywords
              if (title.includes('[bug]') || body.includes('bug:')) labels.push('bug');
              if (title.includes('[feature]') || body.includes('feature:')) labels.push('enhancement');
              if (title.includes('[security]')) labels.push('security');
              if (title.includes('[docs]')) labels.push('documentation');
              if (title.includes('[performance]')) labels.push('performance');

              // Remove duplicates and apply
              const uniqueLabels = [...new Set(labels)];
              if (uniqueLabels.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: uniqueLabels
                });
              }
            }

  auto-assign-reviewers:
    name: Auto-Assign Reviewers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get CODEOWNERS
        id: codeowners
        run: |
          if [ -f ".github/CODEOWNERS" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-assign reviewers
        if: steps.codeowners.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequests = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            for (const pr of pullRequests.data) {
              // Skip if already has reviewers
              if (pr.requested_reviewers.length > 0) continue;

              // Assign random reviewers from team
              const defaultReviewers = ['maintainer1', 'maintainer2', 'maintainer3'];
              const selectedReviewers = defaultReviewers.sort(() => 0.5 - Math.random()).slice(0, 2);

              if (selectedReviewers.length > 0) {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  reviewers: selectedReviewers
                });
              }
            }

  close-stale-issues:
    name: Close Stale Issues
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Close stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            👋 This issue has been inactive for 30 days. It will be closed in 7 days if there's no activity.
            Feel free to comment to keep it alive!
          stale-pr-message: |
            👋 This PR has been inactive for 30 days. It will be closed in 7 days if there's no activity.
            Feel free to comment to keep it alive!
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          close-issue-message: 'Closed due to inactivity.'
          close-pr-message: 'Closed due to inactivity.'
          days-before-stale: 30
          days-before-close: 7
          only-labels: ''
          exempt-issue-labels: 'pinned,security,epic'
          exempt-pr-labels: 'pinned,security'

  auto-merge-dependabot:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check dependabot PRs
        if: github.actor == 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequests = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            for (const pr of pullRequests.data) {
              if (pr.user.login === 'dependabot[bot]') {
                const isDependency = pr.labels.some(l => l.name === 'dependencies');
                
                if (isDependency && pr.draft === false) {
                  // Check if all required checks pass
                  const reviews = await github.rest.pulls.listReviews({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number
                  });

                  const status = await github.rest.repos.getCombinedStatusForRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: pr.head.sha
                  });

                  if (status.state === 'success') {
                    // Auto-merge patch and minor updates
                    const title = pr.title.toLowerCase();
                    if (title.includes('patch') || title.includes('minor')) {
                      await github.rest.pulls.merge({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: pr.number,
                        merge_method: 'squash'
                      });
                    }
                  }
                }
              }
            }

  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for updates
        id: audit
        run: |
          npm outdated || true
          npm audit || true

      - name: Create issue for major updates
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Dependencies need updates',
              body: 'Run `npm outdated` to see available updates.',
              labels: ['dependencies', 'maintenance']
            })

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          echo "# Changelog" > CHANGELOG_TEMP.md
          git log --oneline --decorate --all | head -50 >> CHANGELOG_TEMP.md

      - name: Update CHANGELOG.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG_TEMP.md', 'utf8');
            
            github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'changelog-updated'
            });

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const branches = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            for (const branch of branches.data) {
              if (branch.name === 'main' || branch.name === 'develop') continue;

              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha
              });

              const commitDate = new Date(commit.data.commit.author.date);
              if (commitDate < thirtyDaysAgo) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`
                });
                console.log(`Deleted stale branch: ${branch.name}`);
              }
            }

      - name: Cleanup old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
          minCreationTime: '2h'  # Delete artifacts older than 2 hours
